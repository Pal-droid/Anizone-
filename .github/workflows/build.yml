name: Build Anizone Android Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Android ARM64 (modern phones, 64-bit)
          - arch: arm64
            target: linux-arm64-18.20.0
            output: anizone-android-arm64
            node: '18'
          
          # Android ARMv7 (older phones, 32-bit)
          - arch: armv7
            target: linux-armv7-18.20.0
            output: anizone-android-armv7
            node: '18'
          
          # Android x86_64 (emulators, some devices)
          - arch: x64
            target: linux-x64-18.20.0
            output: anizone-android-x64
            node: '18'
          
          # Also build for desktop (optional)
          - arch: desktop-linux
            target: linux-x64-18.20.0
            output: anizone-linux-x64
            node: '18'
          
          - arch: desktop-windows
            target: windows-x64-18.20.0
            output: anizone-windows-x64.exe
            node: '18'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install

      - name: Configure Next.js for standalone
        run: |
          cat > next.config.mjs << 'EOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            output: 'standalone',
            eslint: { ignoreDuringBuilds: true },
            typescript: { ignoreBuildErrors: true },
            experimental: { turbopack: false },
          };
          export default nextConfig;
          EOF

      - name: Build Next.js app
        run: pnpm build
        env:
          NEXT_TURBOPACK: 0

      - name: Prepare standalone folder
        run: |
          cd .next/standalone
          # Create minimal package.json
          cat > package.json << 'EOF'
          {
            "name": "anizone",
            "version": "1.0.0",
            "scripts": { "start": "node server.js" },
            "dependencies": { "next": "16.1.6" }
          }
          EOF
          pnpm install --prod

      - name: Install nexe
        run: npm install -g nexe

      - name: Build binary for ${{ matrix.target }}
        run: |
          nexe .next/standalone/server.js \
            --target ${{ matrix.target }} \
            --output ./${{ matrix.output }} \
            --verbose

      - name: Make executable
        run: chmod +x ./${{ matrix.output }}

      - name: Upload Android binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ./${{ matrix.output }}