name: Build Anizone Android Binaries

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architecture to build'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - armv7
          - x64

jobs:
  build:
    name: Build for ${{ github.event.inputs.architecture }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Configure Next.js for build
        run: |
          cat > next.config.mjs << 'EOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            output: 'standalone',
            typescript: {
              ignoreBuildErrors: true,
            },
            eslint: {
              ignoreDuringBuilds: true,
            },
          };
          export default nextConfig;
          EOF

      - name: Build Next.js app
        run: NEXT_TURBOPACK=0 pnpm build
        env:
          NEXT_TURBOPACK: 0

      - name: Prepare standalone folder
        run: |
          cd .next/standalone
          pnpm install --prod

      - name: Install nexe
        run: npm install -g nexe

      - name: Build for arm64
        if: github.event.inputs.architecture == 'arm64'
        run: nexe .next/standalone/server.js --target linux-arm64-20.11.0 --output anizone-android-arm64

      - name: Build for armv7
        if: github.event.inputs.architecture == 'armv7'
        run: nexe .next/standalone/server.js --target linux-armv7-20.11.0 --output anizone-android-armv7

      - name: Build for x64
        if: github.event.inputs.architecture == 'x64'
        run: nexe .next/standalone/server.js --target linux-x64-20.11.0 --output anizone-android-x64

      - name: Make executable
        run: chmod +x anizone-android-*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anizone-android-${{ github.event.inputs.architecture }}
          path: anizone-android-*