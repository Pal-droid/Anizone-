name: Build Anizone Android Binaries

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architecture to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64
          - armv7
          - x64

jobs:
  build-arm64:
    if: github.event.inputs.architecture == 'all' || github.event.inputs.architecture == 'arm64'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - run: pnpm install
      - run: echo 'module.exports = { output: "standalone" }' > next.config.js
      - run: NEXT_TURBOPACK=0 pnpm build
      
      - run: cd .next/standalone && pnpm install --prod
      - run: npm install -g nexe
      - run: nexe .next/standalone/server.js --target linux-arm64-20.11.0 --output anizone-android-arm64
      
      - uses: actions/upload-artifact@v4
        with:
          name: anizone-android-arm64
          path: anizone-android-arm64

  build-armv7:
    if: github.event.inputs.architecture == 'all' || github.event.inputs.architecture == 'armv7'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - run: pnpm install
      - run: echo 'module.exports = { output: "standalone" }' > next.config.js
      - run: NEXT_TURBOPACK=0 pnpm build
      
      - run: cd .next/standalone && pnpm install --prod
      - run: npm install -g nexe
      - run: nexe .next/standalone/server.js --target linux-armv7-20.11.0 --output anizone-android-armv7
      
      - uses: actions/upload-artifact@v4
        with:
          name: anizone-android-armv7
          path: anizone-android-armv7

  build-x64:
    if: github.event.inputs.architecture == 'all' || github.event.inputs.architecture == 'x64'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - run: pnpm install
      - run: echo 'module.exports = { output: "standalone" }' > next.config.js
      - run: NEXT_TURBOPACK=0 pnpm build
      
      - run: cd .next/standalone && pnpm install --prod
      - run: npm install -g nexe
      - run: nexe .next/standalone/server.js --target linux-x64-20.11.0 --output anizone-android-x64
      
      - uses: actions/upload-artifact@v4
        with:
          name: anizone-android-x64
          path: anizone-android-x64